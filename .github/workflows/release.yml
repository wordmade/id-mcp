name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          platforms=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/id-mcp-${GOOS}-${GOARCH}"
            [ "$GOOS" = "windows" ] && output="${output}.exe"

            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags "$LDFLAGS" -o "${output}" ./cmd/id-mcp/
          done

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/id-mcp-*
            dist/SHA256SUMS.txt
          body: |
            ## Downloads

            ### MCP Server Binary

            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | `id-mcp-darwin-arm64` |
            | macOS (Intel) | `id-mcp-darwin-amd64` |
            | Linux (x86_64) | `id-mcp-linux-amd64` |
            | Linux (ARM64) | `id-mcp-linux-arm64` |
            | Windows (x86_64) | `id-mcp-windows-amd64.exe` |

            ### Install

            ```bash
            # Download (example: macOS Apple Silicon)
            curl -fsSL https://github.com/wordmade/id-mcp/releases/latest/download/id-mcp-darwin-arm64 \
              -o ~/.local/bin/id-mcp && chmod +x ~/.local/bin/id-mcp
            ```

            ### Or Build from Source

            ```bash
            git clone https://github.com/wordmade/id-mcp.git
            cd id-mcp && make install
            ```

            ### Verify Downloads

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ---

            *[id.wordmade.world](https://id.wordmade.world)*
